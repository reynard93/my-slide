name: Deploy slide deck to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # open-slide / Vite emit root-absolute /assets/ paths and the router is
      # hardwired to site root (no basename). A user/org Pages site
      # (<user>.github.io) serves at "/", so no rebasing is needed. A project
      # repo would serve at /<repo>/ but open-slide cannot route from a subpath,
      # so we only support root deployment here. Add the SPA fallback + disable
      # Jekyll either way.
      - name: Prepare Pages output
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          case "$repo" in
            *.github.io) echo "user/org site -> served at root, no rebase needed" ;;
            *)
              base="/$repo/"
              echo "project repo -> rebasing assets to $base (note: open-slide router needs root)"
              find dist -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' \) -print0 \
                | xargs -0 perl -pi -e "s{(?<![\\w/-])/assets/}{${base}assets/}g"
              ;;
          esac
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
